<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assignly</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body class="auth-page">
  <div class="auth-card card animate-fade">

    <div class="auth-header">
      <a href="index.html" class="logo">Assignly</a>
      <p>Assignment Management System</p>
    </div>

    <div class="card" style="margin: 1rem 0; background: rgba(59,130,246,.08); border: 1px solid rgba(59,130,246,.2);">
      <h3 style="margin-bottom:.5rem;">Portfolio Demo</h3>
      <p style="margin:0;font-size:.9rem;">
        This repository is running in <strong>Demo Mode</strong>.
        Authentication and database functionality have been disabled for demonstration purposes.
      </p>
    </div>

    <div class="form-group">
      <label for="demoRole">View as</label>
      <select id="demoRole">
        <option value="student">Student</option>
        <option value="staff">Staff (Teacher)</option>
        <option value="admin">Administrator</option>
      </select>
    </div>

    <button id="demoBtn" class="primary" style="width:100%; margin-top:1rem;">
      Launch Demo
    </button>

    <div class="auth-footer">
      <p>Original project: HTML • CSS • JavaScript • LocalStorage</p>
    </div>

  </div>

  <script src="assets/js/app.js"></script>

  <script>
    document.getElementById("demoBtn").addEventListener("click", () => {
      const role = document.getElementById("demoRole").value;
      enterDemo(role);
    });
  </script>

</body>

</html>
