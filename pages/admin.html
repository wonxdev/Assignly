<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Assignly</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>
    <nav>
        <div class="nav-container">
            <a href="admin.html" class="logo">Assignly Admin</a>
            <div class="user-info">
                <span id="userName" class="user-name">Loading...</span>
                <button onclick="logout()" class="secondary logout-btn">Logout</button>
            </div>
        </div>
    </nav>

    <main class="container">
        <header class="dashboard-header">
            <div class="header-card card animate-fade">
                <h1>User Administration</h1>
                <p>Manage roles, permissions, and student records system-wide.</p>
            </div>

            <div class="filter-panel animate-fade">
                <div class="filter-group">
                    <label for="filterRole">System Role</label>
                    <select id="filterRole">
                        <option value="all">All Roles</option>
                        <option value="student">Student</option>
                        <option value="staff">Staff</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <div class="filter-group" style="flex: 2;">
                    <label for="searchUser">Search Directory</label>
                    <input type="text" id="searchUser" placeholder="Email, name or class...">
                </div>
            </div>
        </header>

        <div class="card animate-fade">
            <div class="table-container">
                <table class="user-table">
                    <thead>
                        <tr>
                            <th>Identitiy</th>
                            <th>Role</th>
                            <th>Class</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        <tr>
                            <td colspan="4" style="text-align: center;">Loading user records...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Edit User Modal -->
    <div id="editModal" class="modal-backdrop">
        <div class="modal card">
            <h2>Manage Profile</h2>
            <form id="editUserForm">
                <input type="hidden" id="editUserId">

                <div class="form-group">
                    <label for="editFullName">Full Name</label>
                    <input type="text" id="editFullName" required>
                </div>

                <div class="form-group">
                    <label for="editRole">System Role</label>
                    <select id="editRole" required>
                        <option value="student">Student</option>
                        <option value="staff">Staff</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>

                <div id="studentDetailFields"
                    style="display: none; border-top: 1px solid var(--card-border); padding-top: 1rem; margin-top: 1rem;">
                    <p
                        style="font-size: 0.75rem; font-weight: 700; color: var(--primary); margin-bottom: 1rem; text-transform: uppercase;">
                        Student Information</p>
                    <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label for="editGrade">Grade</label>
                            <input type="text" id="editGrade" placeholder="10">
                        </div>
                        <div class="form-group">
                            <label for="editClassLetter">Class Letter</label>
                            <input type="text" id="editClassLetter" placeholder="A">
                        </div>
                    </div>
                </div>

                <div class="modal-actions" style="display: flex; gap: 1rem; margin-top: 1.5rem;">
                    <button type="submit" class="primary" style="flex: 2;">Apply Changes</button>
                    <button type="button" onclick="closeModal()" class="secondary" style="flex: 1;">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../assets/js/app.js"></script>
    <script>
        let allUsers = [];

        async function init() {
            const profile = await checkAuth('admin');
            if (!profile) return;
            document.getElementById('userName').innerText = profile.full_name;
            await loadUsers();
        }

        async function loadUsers() {
            allUsers = window.db.getUsers();
            render();
        }

        function render() {
            const tbody = document.getElementById('userTableBody');
            const role = document.getElementById('filterRole').value;
            const search = document.getElementById('searchUser').value.toLowerCase();
            tbody.innerHTML = '';

            const filtered = allUsers.filter((user) => {
                const queryMatch = (user.full_name?.toLowerCase().includes(search) || user.email.toLowerCase().includes(search));
                const roleMatch = (role === 'all' || user.role === role);
                return queryMatch && roleMatch;
            });

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: var(--text-dim);">No users found.</td></tr>';
                return;
            }

            filtered.forEach((user) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>
                        <div style="font-weight: 600;">${user.full_name || "N/A"}</div>
                        <div style="font-size: 0.75rem; color: var(--text-dim);">${user.email}</div>
                    </td>
                    <td><span class="role-badge role-${user.role}">${user.role}</span></td>
                    <td style="font-weight: 500;">${user.role === 'student' ? `${user.grade}-${user.class_letter}` : '-'}</td>
                    <td><button onclick="openEditModal('${user.id}')" class="secondary" style="padding: 0.4rem 1rem; font-size: 0.75rem;">Edit</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function openEditModal(id) {
            const user = allUsers.find((entry) => entry.id === id);
            if (!user) return;

            document.getElementById('editUserId').value = user.id;
            document.getElementById('editFullName').value = user.full_name || '';
            document.getElementById('editRole').value = user.role;
            document.getElementById('editGrade').value = user.grade || '';
            document.getElementById('editClassLetter').value = user.class_letter || '';

            toggleStudentFields(user.role);
            document.getElementById('editModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('editModal').style.display = 'none'; }
        function toggleStudentFields(role) { document.getElementById('studentDetailFields').style.display = role === 'student' ? 'block' : 'none'; }

        document.getElementById('editRole').onchange = (e) => toggleStudentFields(e.target.value);

        document.getElementById('editUserForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('editUserId').value;
            const role = document.getElementById('editRole').value;
            const payload = {
                full_name: document.getElementById('editFullName').value,
                role: role,
                grade: role === 'student' ? document.getElementById('editGrade').value : null,
                class_letter: role === 'student' ? document.getElementById('editClassLetter').value : null
            };

            window.db.updateUser(id, payload);
            closeModal();
            await loadUsers();
        };

        document.getElementById('filterRole').onchange = render;
        document.getElementById('searchUser').oninput = render;
        window.onload = init;
    </script>
</body>

</html>
